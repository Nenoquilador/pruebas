<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat con API</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-box { background: white; width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { color: #0070f3; margin-top: 0; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 20px; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .answer { margin-top: 20px; padding: 15px; background: #e7f3ff; color: #0056b3; border-radius: 10px; display: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="chat-box">
    <h3>Pregúntale a tu API</h3>
    <input type="text" id="userInput" placeholder="Escribe un hola o una pregunta...">
    <button onclick="preguntar()">Enviar Mensaje</button>
    <div id="msg" class="answer"></div>
</div>

<script>
    async function preguntar() {
        const div = document.getElementById('msg');
        const input = document.getElementById('userInput').value;
        
        if(!input) return;

        div.style.display = "block";
        div.innerText = "Pensando...";

        try {
            const res = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    token: "AQ.Ab8RN6KqCTo6ecjtCkzvrvU9AKhEWIU_ph-PZ55u_JoJGAmilA", 
                    pregunta: input 
                })
            });
            const data = await res.json();
            div.innerText = data.respuesta; // Aquí ya no hay JSON técnico, solo la frase
        } catch (e) {
            div.innerText = "Error de conexión con la API.";
        }
    }
</script>

</body>
</html>
