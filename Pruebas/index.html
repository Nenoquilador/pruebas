<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificador de API Universal</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; padding: 50px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 10px; width: 500px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        pre { background: #000; padding: 15px; border-radius: 5px; color: #7ee787; overflow-x: auto; font-size: 13px; border: 1px dashed #30363d; }
    </style>
</head>
<body>

<div class="card">
    <h3>🔍 API Tester (Vercel)</h3>
    <p style="font-size: 12px; color: #8b949e;">Escribe cualquier pregunta para verificar el procesamiento de datos:</p>
    
    <input type="text" id="preguntaInput" placeholder="Escribe algo aquí...">
    <button onclick="enviarPeticion()">Consultar API</button>

    <h4>Respuesta del Servidor:</h4>
    <pre id="output">Esperando interacción...</pre>
</div>

<script>
    async function enviarPeticion() {
        const out = document.getElementById('output');
        const txt = document.getElementById('preguntaInput').value;
        const token = "AQ.Ab8RN6KqCTo6ecjtCkzvrvU9AKhEWIU_ph-PZ55u_JoJGAmilA";

        if(!txt) return out.innerText = "Escribe algo primero...";

        out.innerText = "Procesando...";

        try {
            const res = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, pregunta: txt })
            });
            const data = await res.json();
            out.innerText = JSON.stringify(data, null, 4);
        } catch (err) {
            out.innerText = "Error: Verifica que el servidor esté activo.";
        }
    }
</script>

</body>
</html>
